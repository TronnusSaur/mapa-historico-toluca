name: 🔒 Deploy Privado (develop → /dev/)

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build (versión privada/financiera)
        run: npm run build
        env:
          DEPLOY_ENV: development

      - name: Deploy a /dev/ en gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          target-folder: dev   # Despliega SOLO en la subcarpeta /dev/
          clean: true          # Limpia /dev/ en cada deploy
